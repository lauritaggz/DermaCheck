# DermaCheck - Producción con MySQL
# Frontend Web (React + Vite) + Backend (FastAPI) + MySQL
# 
# Uso: docker compose up --build -d
# 
# URLs:
#   - Frontend: http://localhost:3000
#   - Backend API: http://localhost:8000
#   - Swagger Docs: http://localhost:8000/docs
#
# Cambiar credenciales MySQL antes de exponer a internet.
# Volúmenes persistentes: mysql_data (base de datos), face_uploads (imágenes),
# backend_storage (training_images + cola temporal job_queue)

version: '3.8'

x-timezone: &timezone
  TZ: ${TZ:-America/Santiago}

services:
  # Base de datos MySQL
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      <<: *timezone
      MYSQL_DATABASE: dermacheck
      MYSQL_USER: dermacheck
      MYSQL_PASSWORD: dermacheck_change_in_production
      MYSQL_ROOT_PASSWORD: dermacheck_root_change_in_production
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-pdermacheck_root_change_in_production"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 30s
    networks:
      - dermacheck_network

  # Backend API (FastAPI + PyTorch + YOLO)
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${API_HOST_PORT:-8001}:8000"
    env_file:
      - ./backend/.env
    environment:
      <<: *timezone
      DATABASE_URL: mysql+pymysql://dermacheck:dermacheck_change_in_production@db:3306/dermacheck?charset=utf8mb4
      MODEL_PATH: ml_models/best.pt
      UPLOAD_DIR: static/uploads
      CORS_ORIGINS: http://localhost:3000,http://localhost:5173,http://localhost:3005,http://127.0.0.1:5173,http://127.0.0.1:3005
      # Cola de análisis (in-memory; requiere 1 proceso uvicorn — no usar múltiples workers)
      ANALYSIS_QUEUE_MAX_SIZE: ${ANALYSIS_QUEUE_MAX_SIZE:-10}
      ANALYSIS_MAX_CONCURRENT: ${ANALYSIS_MAX_CONCURRENT:-1}
      ANALYSIS_JOB_TTL_SECONDS: ${ANALYSIS_JOB_TTL_SECONDS:-3600}
      ANALYSIS_JOB_POLL_INTERVAL_HINT: ${ANALYSIS_JOB_POLL_INTERVAL_HINT:-1.5}
      EMAIL_ENABLED: ${EMAIL_ENABLED:-false}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-resend}
      EMAIL_API_KEY: ${EMAIL_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-DermaCheck <no-reply@dermacheck.cl>}
      EMAIL_REPLY_TO: ${EMAIL_REPLY_TO:-}
      EMAIL_RATE_LIMIT_PER_MINUTE: ${EMAIL_RATE_LIMIT_PER_MINUTE:-5}
      EMAIL_SMTP_HOST: ${EMAIL_SMTP_HOST:-}
      EMAIL_SMTP_PORT: ${EMAIL_SMTP_PORT:-587}
      EMAIL_SMTP_USER: ${EMAIL_SMTP_USER:-}
      EMAIL_SMTP_PASSWORD: ${EMAIL_SMTP_PASSWORD:-}
      EMAIL_SMTP_USE_TLS: ${EMAIL_SMTP_USE_TLS:-true}
    volumes:
      - face_uploads:/app/static/uploads
      - backend_storage:/app/storage
      - ./backend/ml_models:/app/ml_models:ro
      - ./backend/app:/app/app
    depends_on:
      db:
        condition: service_healthy
    networks:
      - dermacheck_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Frontend Web (React + Vite)
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8001
    restart: unless-stopped
    ports:
      - "${WEB_HOST_PORT:-3005}:80"
    depends_on:
      - api
    environment:
      <<: *timezone
    networks:
      - dermacheck_network

volumes:
  mysql_data:
    driver: local
  face_uploads:
    driver: local
  backend_storage:
    driver: local

networks:
  dermacheck_network:
    driver: bridge
