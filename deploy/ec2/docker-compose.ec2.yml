# DermaCheck — despliegue en AWS EC2 (API + MySQL + Web)
#
# Desde la raíz del repositorio:
#   docker compose --env-file deploy/ec2/.env -f deploy/ec2/docker-compose.ec2.yml up -d --build
#
# URLs (ajusta EC2_PUBLIC_URL en .env):
#   - Frontend: https://<EC2_PUBLIC_URL>/
#   - API:      https://<EC2_PUBLIC_URL>/api/  o  :8000/docs

name: dermacheck_ec2

x-timezone: &timezone
  TZ: ${TZ:-America/Santiago}

services:
  db:
    image: mysql:8.0
    container_name: dermacheck_db_ec2
    restart: always
    environment:
      <<: *timezone
      MYSQL_DATABASE: ${MYSQL_DATABASE:?definir MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER:?definir MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?definir MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?definir MYSQL_ROOT_PASSWORD}
    volumes:
      - ./data/mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p$${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 35s
    networks:
      - dermacheck_network

  api:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    container_name: dermacheck_api_ec2
    restart: always
    ports:
      - "${API_HOST_PORT:-8000}:8000"
    environment:
      <<: *timezone
      DATABASE_URL: ${DATABASE_URL:?definir DATABASE_URL}
      MODEL_PATH: ml_models/best.pt
      UPLOAD_DIR: static/uploads
      CORS_ORIGINS: ${CORS_ORIGINS:?definir CORS_ORIGINS}
      ANALYSIS_QUEUE_MAX_SIZE: ${ANALYSIS_QUEUE_MAX_SIZE:-10}
      ANALYSIS_MAX_CONCURRENT: ${ANALYSIS_MAX_CONCURRENT:-1}
      ANALYSIS_JOB_TTL_SECONDS: ${ANALYSIS_JOB_TTL_SECONDS:-3600}
      ANALYSIS_JOB_POLL_INTERVAL_HINT: ${ANALYSIS_JOB_POLL_INTERVAL_HINT:-1.5}
      EMAIL_ENABLED: ${EMAIL_ENABLED:-false}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-smtp}
      EMAIL_API_KEY: ${EMAIL_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-DermaCheck <no-reply@dermacheck.cl>}
      EMAIL_REPLY_TO: ${EMAIL_REPLY_TO:-}
      EMAIL_RATE_LIMIT_PER_MINUTE: ${EMAIL_RATE_LIMIT_PER_MINUTE:-5}
      EMAIL_SMTP_HOST: ${EMAIL_SMTP_HOST:-}
      EMAIL_SMTP_PORT: ${EMAIL_SMTP_PORT:-587}
      EMAIL_SMTP_USER: ${EMAIL_SMTP_USER:-}
      EMAIL_SMTP_PASSWORD: ${EMAIL_SMTP_PASSWORD:-}
      EMAIL_SMTP_USE_TLS: ${EMAIL_SMTP_USE_TLS:-true}
      DERMACHECK_DERM_CONF: ${DERMACHECK_DERM_CONF:-0.25}
      DERMACHECK_EXPRESSION_LINES_CONF: ${DERMACHECK_EXPRESSION_LINES_CONF:-0.65}
      PRODUCT_SEARCH_CACHE_TTL_HOURS: ${PRODUCT_SEARCH_CACHE_TTL_HOURS:-12}
      PRODUCT_SEARCH_MAX_RESULTS: ${PRODUCT_SEARCH_MAX_RESULTS:-5}
      PRODUCT_SEARCH_MIN_RESULTS: ${PRODUCT_SEARCH_MIN_RESULTS:-3}
      PRODUCT_SEARCH_ENABLE_PLAYWRIGHT: ${PRODUCT_SEARCH_ENABLE_PLAYWRIGHT:-true}
    volumes:
      - ./data/uploads:/app/static/uploads
      - ./data/storage:/app/storage
      - ../../backend/ml_models:/app/ml_models:ro
    depends_on:
      db:
        condition: service_healthy
    networks:
      - dermacheck_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 3G

  web:
    build:
      context: ../../web
      dockerfile: Dockerfile
      args:
        # URL pública del backend (mismo dominio; nginx proxya /api/ al contenedor api)
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:?definir VITE_API_BASE_URL}
    container_name: dermacheck_web_ec2
    restart: always
    ports:
      - "${WEB_HOST_PORT:-80}:80"
      - "${WEB_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx-ec2.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    healthcheck:
      test: ["CMD", "wget", "--no-check-certificate", "-q", "--spider", "https://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      api:
        condition: service_healthy
    networks:
      - dermacheck_network

networks:
  dermacheck_network:
    driver: bridge
