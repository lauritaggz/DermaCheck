# Producción — ejecutar desde la RAÍZ del repositorio:
#
#   cp deploy/production/env.production.example deploy/production/.env
#   # Edita .env con contraseñas reales
#   docker compose --env-file deploy/production/.env -f deploy/production/docker-compose.prod.yml up -d --build
#
# Salud: http://SERVIDOR:${API_HOST_PORT}/health
# El contexto de build es ../../backend relativo a este archivo → carpeta backend del repo.
# Datos persistentes (MySQL + subidas de imágenes): ./data/ respecto a deploy/production/
#   - data/mysql/     → base de datos
#   - data/uploads/   → capturas públicas (static/uploads)
#   - data/storage/   → training_images (consentimiento) + job_queue temporal

name: dermacheck_prod

x-timezone: &timezone
  TZ: ${TZ:-America/Santiago}

services:
  db:
    image: mysql:8.0
    container_name: dermacheck_db_prod
    restart: always
    environment:
      <<: *timezone
      MYSQL_DATABASE: ${MYSQL_DATABASE:?definir en .env}
      MYSQL_USER: ${MYSQL_USER:?definir en .env}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?definir en .env}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?definir en .env}
    volumes:
      - ./data/mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p$${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 35s
    networks:
      - dermacheck_network

  api:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    container_name: dermacheck_api_prod
    restart: always
    environment:
      <<: *timezone
      DATABASE_URL: ${DATABASE_URL:?definir en .env}
      MODEL_PATH: ml_models/best.pt
      UPLOAD_DIR: static/uploads
      CORS_ORIGINS: http://localhost:3005,http://localhost:3000,${FRONTEND_NETLIFY_URL:-}
      EMAIL_ENABLED: ${EMAIL_ENABLED:-false}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-resend}
      EMAIL_API_KEY: ${EMAIL_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-DermaCheck <no-reply@dermacheck.cl>}
      EMAIL_REPLY_TO: ${EMAIL_REPLY_TO:-}
      EMAIL_RATE_LIMIT_PER_MINUTE: ${EMAIL_RATE_LIMIT_PER_MINUTE:-5}
      # Cola de análisis (in-memory; mantener 1 proceso — no gunicorn multi-worker sin Redis)
      ANALYSIS_QUEUE_MAX_SIZE: ${ANALYSIS_QUEUE_MAX_SIZE:-10}
      ANALYSIS_MAX_CONCURRENT: ${ANALYSIS_MAX_CONCURRENT:-1}
      ANALYSIS_JOB_TTL_SECONDS: ${ANALYSIS_JOB_TTL_SECONDS:-3600}
      ANALYSIS_JOB_POLL_INTERVAL_HINT: ${ANALYSIS_JOB_POLL_INTERVAL_HINT:-1.5}
      DERMACHECK_DERM_CONF: ${DERMACHECK_DERM_CONF:-0.25}
      DERMACHECK_EXPRESSION_LINES_CONF: ${DERMACHECK_EXPRESSION_LINES_CONF:-0.65}
    volumes:
      - ./data/uploads:/app/static/uploads
      - ./data/storage:/app/storage
      - ../../backend/ml_models:/app/ml_models:ro
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    depends_on:
      db:
        condition: service_healthy
    networks:
      - dermacheck_network
      - red_multiproposito

networks:
  dermacheck_network:
    driver: bridge
  red_multiproposito:
    external: true
    name: red_multiproposito

